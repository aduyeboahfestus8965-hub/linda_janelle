        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgba(85, 242, 71, 0.8) 0%, rgba(0, 28, 7, 0.9) 0%), url('https://i.pinimg.com/1200x/cc/8c/a6/cc8ca69cd31b53bac19b2e5ae4856d7d.jpg') center/cover no-repeat; /* Replace 'https://i.pinimg.com/1200x/cc/8c/a6/cc8ca69cd31b53bac19b2e5ae4856d7d.jpg' with your image path */

            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #ffffff, #ffffff);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            font-weight: bold;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #b4e7ba;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .input-group input:focus {
            outline: none;
            border-color: #7aea66;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .verify-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #05a019, #013209);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .verify-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .verify-btn:active {
            transform: translateY(-1px);
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.4s ease;
        }

        .result.show {
            opacity: 1;
            transform: scale(1);
        }

        .result.valid {
            background: linear-gradient(45deg, #05a019, #013209);
            color: white;
        }

        .result.invalid {
            background: linear-gradient(45deg, #ff0303, #8b221d);
            color: white;
        }

        .result.pending {
            background: linear-gradient(45deg, #f39c12, #e67e22);
            color: white;
        }

        .ticket-info {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            border-left: 5px solid #05a019;
            text-align: left;
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.4s ease;
        }

        .ticket-info.show {
            opacity: 1;
            transform: translateX(0);
        }

        .ticket-info h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .ticket-info p {
            color: #666;
            margin-bottom: 8px;
        }

        .event-details {
            background: linear-gradient(135deg, #05a019, #013209);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .event-details h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .event-details p {
            opacity: 0.9;
            font-size: 1rem;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            h1 {
                font-size: 1.7rem;
            }
        }
    </style>

        let usedTickets = JSON.parse(localStorage.getItem('usedTicketsNSA2026')) || [];

        // Initialize stats
        function updateStats() {
            const statsDiv = document.getElementById('stats');
            const usedCountSpan = document.getElementById('usedCount');
            const totalCountSpan = document.getElementById('totalCount');
            
            usedCountSpan.textContent = usedTickets.length;
            totalCountSpan.textContent = validPatterns.length;
            
            if (usedTickets.length > 0) {
                statsDiv.style.display = 'block';
            }
        }

        function markTicketAsUsed(ticketCode) {
            if (!usedTickets.includes(ticketCode)) {
                usedTickets.push(ticketCode);
                localStorage.setItem('usedTicketsNSA2026', JSON.stringify(usedTickets));
                updateStats();
            }
        }

        function verifyTicket() {
            const ticketCode = document.getElementById('ticketCode').value.trim().toUpperCase();
            const resultDiv = document.getElementById('result');
            const ticketInfoDiv = document.getElementById('ticketInfo');
            const verifyBtn = document.getElementById('verifyBtn');

            // Clear previous results
            resultDiv.className = 'result';
            ticketInfoDiv.className = 'ticket-info';
            resultDiv.innerHTML = '';
            ticketInfoDiv.innerHTML = '';

            if (!ticketCode) {
                showResult('Please enter a ticket code', 'invalid');
                return;
            }

            // Check if already used
            if (usedTickets.includes(ticketCode)) {
                showResult('❌ TICKET ALREADY USED', 'used');
                showTicketInfo(ticketCode, true);
                return;
            }

            // Check if valid
            const isValid = validPatterns.includes(ticketCode);

            setTimeout(() => {
                if (isValid) {
                    showResult('Ticket Verified Successfully!', 'valid');
                    showTicketInfo(ticketCode, false);
                    markTicketAsUsed(ticketCode);
                    verifyBtn.disabled = true;
                    setTimeout(() => verifyBtn.disabled = false, 2000);
                } else {
                    showResult('Invalid Ticket Code', 'invalid');
                }
            }, 800);
        }

        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = message;
            resultDiv.className = `result ${type} show`;
        }

        function showTicketInfo(ticketCode, isUsed) {
            const ticketInfoDiv = document.getElementById('ticketInfo');
            const status = isUsed ? 'ALREADY USED' : 'VALID';
            const statusColor = isUsed ? '#f39c12' : '#05a019';
            
            ticketInfoDiv.innerHTML = `
                <h3>🎫 Ticket Details</h3>
                <p><strong>Ticket Code:</strong> ${ticketCode}</p>
                <p><strong>Status:</strong> <span style="color: ${statusColor}; font-weight: bold;">${status}</span></p>
                <p><strong>Type:</strong> General Admission</p>
                <p><strong>Valid For:</strong> All Night</p>
            `;
            ticketInfoDiv.className = `ticket-info ${isUsed ? 'used' : ''} show`;
        }

        // Allow Enter key to verify
        document.getElementById('ticketCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyTicket();
            }
        });

        // Auto-format input
        document.getElementById('ticketCode').addEventListener('input', function(e) {
            let value = e.target.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
            e.target.value = value;
        });

        // Initialize on page load
        updateStats();
